<!DOCTYPE html>

<head>

  <title>SASAERU 管理ダッシュボード</title>
  <meta name="robots" content="noindex,nofollow">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- 設定は Netlify Snippet Injection で window.SASAERU_CONFIG として注入済み -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
    .badge-pending  { background:#fef3c7; color:#d97706; }
    .badge-public   { background:#dcfce7; color:#16a34a; }
    .badge-rejected { background:#fee2e2; color:#dc2626; }
    .badge-new      { background:#eff6ff; color:#2563eb; }
    .badge-done     { background:#f0fdf4; color:#16a34a; }
    .badge-unread   { background:#fdf2f8; color:#9333ea; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .25s ease forwards; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-thumb { background:#6366f1; border-radius:4px; }
    #sidebar { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    #sidebar-overlay { transition: opacity 0.3s ease; }
  </style>
</head>
<noscript><div style="background:#ff4444;color:#fff;text-align:center;padding:12px;font-family:sans-serif;font-size:14px;position:fixed;top:0;left:0;right:0;z-index:9999">このサイトの利用にはJavaScriptが必要です。ブラウザの設定を確認してください。</div></noscript>
<body class="min-h-screen bg-slate-100 text-slate-900">

  <!-- ログイン画面 -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">
      <div class="flex items-center gap-2.5 mb-8">
        <div class="w-10 h-10 bg-orange-400 rounded-xl flex items-center justify-center shadow-md shadow-orange-400/30">
          <i data-lucide="heart" class="text-white fill-white" width="22" height="22"></i>
        </div>
        <div>
          <p class="text-lg font-black text-[#0f0e2e] leading-none">SASAERU</p>
          <p class="text-[10px] text-slate-400 mt-0.5">管理ダッシュボード</p>
        </div>
      </div>
      <h1 class="text-xl font-black text-[#0f0e2e] mb-1">ログイン</h1>
      <p class="text-xs text-slate-400 mb-6">管理者アカウントでサインインしてください</p>
      <form id="login-form" class="space-y-4">
        <div>
          <label for="login-email" class="block text-xs font-bold text-slate-600 mb-1.5">メールアドレス</label>

            class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-400 outline-none text-sm transition-all">
        </div>
        <div>
          <label for="login-password" class="block text-xs font-bold text-slate-600 mb-1.5">パスワード</label>
          <div class="relative">
            <input type="password" id="login-password" required maxlength="200" autocomplete="current-password"
              class="w-full px-4 py-2.5 pr-11 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-400 outline-none text-sm transition-all">
            <button type="button" onclick="toggleAdminPwd()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <i id="admin-eye" data-lucide="eye" width="16" height="16"></i>

        </div>
        <button type="submit" id="login-submit-btn"

        <a href="index.html" class="hover:text-indigo-700 underline underline-offset-2">← 公開サイトへ戻る</a>

        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

            class="side-btn w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-bold transition-all text-white/60 hover:bg-white/10">

          <button onclick="switchTab('inquiries')" data-tab="inquiries"
            class="side-btn w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-bold transition-all text-white/60 hover:bg-white/10">

        <div class="px-4 py-4 border-t border-white/10">

                </div>
                <p id="ov-inquiries" class="text-3xl font-black text-[#0f0e2e]">—</p>

              <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">

            <div id="orgs-list" class="space-y-3">

              <div class="text-xs text-slate-400 text-center py-8">読み込み中...</div>

            <div class="flex items-center justify-between mb-4">

        <button id="confirm-ok" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-white"></button>
      </div>

  <!-- 否認理由ダイアログ（TASK-03） -->
  <div id="reject-dialog" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4"
    role="dialog" aria-modal="true" aria-labelledby="reject-dialog-title">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
      <h3 id="reject-dialog-title" class="text-base font-black text-[#0f0e2e] mb-2">申請を却下しますか？</h3>
      <p class="text-sm text-slate-500 mb-3">ステータスを「却下」に変更します。後から変更することもできます。</p>
      <label for="reject-reason" class="block text-xs font-bold text-slate-600 mb-1.5">否認理由（任意）</label>
      <textarea id="reject-reason" rows="3" maxlength="500"
        placeholder="理由がある場合は入力してください。申請者へのメールに含まれます。"

      <div class="flex gap-3">
        <button onclick="closeRejectDialog()" class="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm transition-all">キャンセル</button>
        <button id="reject-ok" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-white bg-red-500 hover:bg-red-600">却下する</button>
      </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-[200] hidden">
    <div id="toast-inner" class="px-5 py-3 rounded-xl text-sm font-bold shadow-xl"></div>
  </div>

  <script>
  // ============================================================
  // Firebase 設定
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyBJrCIaSKr7m4B-Lj-YGMt9GGoY9CxPjQk",
    authDomain: "sasaeru-7f375.firebaseapp.com",
    projectId: "sasaeru-7f375",
    storageBucket: "sasaeru-7f375.firebasestorage.app",
    messagingSenderId: "51698278682",
    appId: "1:51698278682:web:7ebcac3c2d90fc04edcca3"
  };
  const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

  let db = null, auth = null;
  if (isConfigured) {
    try {
      firebase.initializeApp(firebaseConfig);
      db   = firebase.firestore();
      auth = firebase.auth();
    } catch(e) { console.warn("Firebase init error:", e); }
  }

  // ============================================================
  // 状態
  // ============================================================
  let currentTab       = 'overview';
  let allOrgsData      = [];
  let orgFilter        = 'all';
  let allInquiriesData = [];
  let inquiryFilter    = 'all';
  let confirmCallback  = null;

  // ============================================================
  // 管理者認証
  // ============================================================
  async function verifyAdminAndShow(user, errEl) {
    try {
      const tokenResult = await user.getIdTokenResult(true);
      if (tokenResult.claims.admin === true) { showDashboard(user); return; }
    } catch(e) { console.error('Claims check error:', e); }
    if (auth) await auth.signOut();
    showLogin();
    if (errEl) errEl.textContent = '管理者権限がありません。管理者アカウントでログインしてください。';
  }

  // ページロード
  if (auth) {
    new Promise(resolve => {
      const unsub = auth.onAuthStateChanged(user => { unsub(); resolve(user); });
    }).then(user => {
      if (!user) { showLogin(); return; }
      // B-3: verifyAdminAndShow の Promise を return して rejection を伝播させる
      return verifyAdminAndShow(user, null);
    }).catch(err => {

    const btn      = document.getElementById('login-submit-btn');

    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      await verifyAdminAndShow(cred.user, errEl);

        'auth/wrong-password':    'パスワードが正しくありません',

        'auth/user-disabled':     'このアカウントは無効化されています',
      };
      errEl.textContent = msgs[err.code] || 'ログインに失敗しました: ' + err.message;
    } finally {
      btn.disabled  = false;
      btn.innerHTML = 'サインイン';
    }
  });

  // ============================================================

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])
    );
  }
  let _toastTimer = null;
  function showToast(msg, ok = true) {
    const t  = document.getElementById('toast');
    const ti = document.getElementById('toast-inner');
    ti.textContent = msg;
    ti.className = `px-5 py-3 rounded-xl text-sm font-bold shadow-xl ${ok ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
    t.classList.remove('hidden');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.add('hidden'), 3000);
  }
  function fmtDate(val) {
    if (!val) return '—';
    const d = val.toDate ? val.toDate() : new Date(val);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }
  function statusBadge(status) {
    const map = {
      pending:  ['badge-pending',  '審査中'],
      public:   ['badge-public',   '公開中'],
      rejected: ['badge-rejected', '却下'],
      private:  ['bg-slate-100 text-slate-500', '非公開'],  // M-6
      new:      ['badge-new',      '未対応'],
      done:     ['badge-done',     '対応済み'],
      unread:   ['badge-unread',   '未読'],
      read:     ['bg-slate-100 text-slate-500', '既読'],
    };
    const [cls, label] = map[status] || ['bg-slate-100 text-slate-500', status];
    return `<span class="text-[10px] font-black px-2 py-0.5 rounded-full ${cls}">${label}</span>`;
  }
  const CAT = { sports:'スポーツ', culture:'文化・芸術', welfare:'福祉', other:'その他' };

  function updateBadge(id, count) {
    const el = document.getElementById(id);

    else { el.classList.add('hidden'); }

  // ============================================================
  // 確認ダイアログ
  // ============================================================
  function showConfirm(title, body, btnLabel, btnColor, callback) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-body').textContent  = body;
    const okBtn = document.getElementById('confirm-ok');
    okBtn.textContent = btnLabel;
    okBtn.className   = `flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-white ${btnColor}`;
    confirmCallback   = callback;
    const d = document.getElementById('confirm-dialog');
    d.classList.remove('hidden'); d.classList.add('flex');
    setTimeout(() => okBtn.focus(), 50);
  }
  function closeConfirm() {
    const d = document.getElementById('confirm-dialog');
    d.classList.add('hidden'); d.classList.remove('flex');
    confirmCallback = null;
  }
  document.getElementById('confirm-ok').addEventListener('click', async () => {
    // B-1: ダブルクリックによる二重実行防止 — 呼び出し前に null に設定
    const cb = confirmCallback;
    confirmCallback = null;
    if (cb) {
      const okBtn = document.getElementById('confirm-ok');
      okBtn.disabled = true;
      try { await cb(); } finally { okBtn.disabled = false; }
    }
    closeConfirm();
  });
  document.getElementById('confirm-dialog').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeConfirm();
    if (e.key === 'Tab') {
      const btns = document.getElementById('confirm-dialog').querySelectorAll('button');
      const first = btns[0], last = btns[btns.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  });

  function approveOrg(id) {
    showConfirm('この団体を承認・公開しますか？', '承認するとサイト上に公開されます。', '承認・公開する', 'bg-green-500 hover:bg-green-600',
      async () => {
        if (!db) { showToast('Firebase未設定です', false); return; }
        try {
          await db.collection('organizations').doc(id).update({ status:'public', updated_at: firebase.firestore.FieldValue.serverTimestamp() });
          showToast('承認・公開しました');
          loadTab(currentTab); loadOverview();
          // 承認メール送信（TASK-03）
          const orgSnap = await db.collection('organizations').doc(id).get();
          if (orgSnap.exists) {
            sendOrgStatusEmail('approve', { ...orgSnap.data(), _id: id });
          }
        } catch(e) { showToast('エラー: ' + e.message, false); }
      }
    );
  }

  function changeOrgStatus(id, status, title, body) {
    showConfirm(title, body, '実行する', 'bg-slate-700 hover:bg-slate-800', async () => {
      if (!db) { showToast('Firebase未設定です', false); return; }
      try {

      } catch(e) { showToast('エラー: ' + e.message, false); }
    });

  function deleteOrg(id, name) {
    showConfirm(
      `「${name}」を削除しますか？`,
      'この操作は取り消せません。支援メニュー・問い合わせ履歴・活動日記もすべて削除されます。\n⚠️ ログインアカウント（メール）は別途 Firebase Console から削除してください。',
      '削除する', 'bg-red-500 hover:bg-red-600',
      async () => {
        if (!db) { showToast('Firebase未設定です', false); return; }
        try {
          const orgRef = db.collection('organizations').doc(id);
          const orgDoc = await orgRef.get();
          const ownerUid = orgDoc.exists ? orgDoc.data().owner_uid : null;
          const batch = db.batch();

          // B-1: menus サブコレクション削除
          const menusSnap = await orgRef.collection('menus').get();
          menusSnap.docs.forEach(d => batch.delete(d.ref));

          // B-1: inquiries（この団体宛）削除
          const inqSnap = await db.collection('inquiries').where('org_id', '==', id).get();
          inqSnap.docs.forEach(d => batch.delete(d.ref));

          // B-1: posts（このオーナーの投稿）削除
          if (ownerUid) {
            const postsSnap = await db.collection('posts').where('owner_uid', '==', ownerUid).get();
            postsSnap.docs.forEach(d => batch.delete(d.ref));
          }

          // 団体ドキュメント本体を削除
          batch.delete(orgRef);
          await batch.commit();
          showToast('削除しました'); loadTab(currentTab); loadOverview();
        } catch(e) { showToast('エラー: ' + e.message, false); }
      }
    );
  }

      const active = btn.dataset.inqFilter === f;
      btn.classList.toggle('bg-[#0f0e2e]', active); btn.classList.toggle('text-white', active);
      btn.classList.toggle('bg-white',      !active); btn.classList.toggle('text-slate-500', !active);
      btn.classList.toggle('border',        !active); btn.classList.toggle('border-slate-200', !active);
    });
    renderFilteredInquiries();
  }

  function renderFilteredInquiries() {
    const el   = document.getElementById('inquiries-list');
    const list = inquiryFilter === 'all' ? allInquiriesData : allInquiriesData.filter(d => d.data().status === inquiryFilter);
    const countEl = document.getElementById('inq-count');
    if (countEl) countEl.textContent = `${list.length}件`;
    if (!list.length) {
      el.innerHTML = `<div class="text-xs text-slate-400 text-center py-10">${allInquiriesData.length === 0 ? '支援申請はありません' : '該当する申請はありません'}</div>`;
      return;
    }
    el.innerHTML = list.map(d => {
      const q  = d.data();
      const id = d.id;
      return `
        <div class="bg-white rounded-2xl border ${q.status === 'new' ? 'border-blue-100' : 'border-slate-100'} shadow-sm p-5">
          <div class="flex items-start justify-between gap-4 mb-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1 flex-wrap">
                <p class="text-sm font-black text-[#0f0e2e]">${esc(q.company_name||'—')}</p>
                ${statusBadge(q.status||'new')}
              </div>
              <div class="flex flex-wrap gap-3 text-xs text-slate-400">
                <span>${esc(q.pic_name||'—')} 様</span>
                <span class="flex items-center gap-1"><i data-lucide="mail" width="11" height="11"></i>${esc(q.sender_email||'—')}</span>
                ${q.phone ? `<span class="flex items-center gap-1"><i data-lucide="phone" width="11" height="11"></i>${esc(q.phone)}</span>` : ''}
                <span class="flex items-center gap-1"><i data-lucide="clock" width="11" height="11"></i>${fmtDate(q.created_at)}</span>
              </div>
            </div>
          </div>
          ${q.message ? `<p class="text-xs text-slate-600 bg-slate-50 rounded-xl p-3 mb-3 leading-relaxed">${esc(q.message)}</p>` : ''}
          <div class="flex flex-wrap gap-2">
            ${q.status !== 'done' ? `
              <button onclick="updateInquiryStatus('${id}','done')"
                class="flex items-center gap-1 px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold rounded-lg transition-all">
                <i data-lucide="check" width="12" height="12"></i>対応済みにする</button>` : `
              <button onclick="updateInquiryStatus('${id}','new')"
                class="flex items-center gap-1 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold rounded-lg transition-all">
                <i data-lucide="undo-2" width="12" height="12"></i>未対応に戻す</button>`}
            <a href="mailto:${esc(q.sender_email)}?subject=${encodeURIComponent('【SASAERU】支援申請についてのご連絡')}"
              class="flex items-center gap-1 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-lg transition-all">
              <i data-lucide="mail" width="12" height="12"></i>返信する</a>
          </div>
        </div>`;
    }).join('');
    lucide.createIcons();
  }

  async function updateInquiryStatus(id, status) {
    if (!db) return;
    try {
      await db.collection('inquiries').doc(id).update({ status });
      showToast(status === 'done' ? '対応済みにしました' : '未対応に戻しました');
      loadInquiries();
    } catch(e) { showToast('エラー: ' + e.message, false); }
  }

  // ============================================================
  // お問い合わせ（Contacts）- Bug Fix: sort result stored
  // ============================================================
  async function loadContacts() {
    const el = document.getElementById('contacts-list');
    if (!db) { el.innerHTML = demoMsg(); return; }
    try {
      const snap = await db.collection('contacts').get();
      const sorted = snap.docs.slice().sort((a,b) => (b.data().created_at?.toMillis?.()??0)-(a.data().created_at?.toMillis?.()??0));
      const unreadCount = sorted.filter(d => !d.data().read_at).length;
      updateBadge('badge-contacts', unreadCount);
      if (snap.empty) {
        el.innerHTML = '<div class="text-xs text-slate-400 text-center py-10">お問い合わせはありません</div>';
        return;
      }
      el.innerHTML = sorted.map(d => {
        const c  = d.data();
        const id = d.id;
        const isRead = !!c.read_at;
        return `
          <div class="bg-white rounded-2xl border ${isRead ? 'border-slate-100' : 'border-purple-100'} shadow-sm p-5 ${isRead ? '' : 'ring-1 ring-purple-100'}">
            <div class="flex items-start justify-between gap-4 mb-2">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <p class="text-sm font-black text-[#0f0e2e]">${esc(c.name||'—')}</p>
                  ${statusBadge(isRead ? 'read' : 'unread')}
                </div>
                <div class="flex flex-wrap gap-3 text-xs text-slate-400">
                  <span class="flex items-center gap-1"><i data-lucide="mail" width="11" height="11"></i>${esc(c.email||'—')}</span>
                  <span class="flex items-center gap-1"><i data-lucide="clock" width="11" height="11"></i>${fmtDate(c.created_at)}</span>
                </div>
              </div>
              <div class="flex gap-2 shrink-0">
                ${!isRead ? `
                  <button onclick="markContactRead('${id}')"
                    class="flex items-center gap-1 px-3 py-1.5 bg-purple-50 hover:bg-purple-100 text-purple-700 text-xs font-bold rounded-lg transition-all">
                    <i data-lucide="check" width="12" height="12"></i>既読にする</button>` : ''}
                <a href="mailto:${esc(c.email)}?subject=${encodeURIComponent('【SASAERU】お問い合わせへのご回答')}"
                  class="flex items-center gap-1 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-lg transition-all">
                  <i data-lucide="mail" width="12" height="12"></i>返信</a>
              </div>
            </div>
            ${c.message ? `<p class="text-xs text-slate-600 bg-slate-50 rounded-xl p-3 leading-relaxed">${esc(c.message)}</p>` : ''}
          </div>`;
      }).join('');
      lucide.createIcons();
    } catch(e) { el.innerHTML = errMsg(e); }
  }

  async function markContactRead(id) {
    if (!db) return;
    try {
      await db.collection('contacts').doc(id).update({ read_at: firebase.firestore.FieldValue.serverTimestamp() });
      showToast('既読にしました');
      loadContacts(); loadOverview();
    } catch(e) { showToast('エラー: ' + e.message, false); }
  }

  async function markAllContactsRead() {
    if (!db) { showToast('Firebase未設定です', false); return; }
    try {
      const snap = await db.collection('contacts').get();
      const unread = snap.docs.filter(d => !d.data().read_at);
      if (unread.length === 0) { showToast('未読のお問い合わせはありません'); return; }
      const batch = db.batch();
      const ts = firebase.firestore.FieldValue.serverTimestamp();
      unread.forEach(d => batch.update(d.ref, { read_at: ts }));
      await batch.commit();
      showToast(`${unread.length}件を既読にしました`);
      loadContacts(); loadOverview();
    } catch(e) { showToast('エラー: ' + e.message, false); }
  }

  // ============================================================
  // 支援メニュー管理（TASK-05）
  // ============================================================
  async function loadAdminMenus() {
    const el = document.getElementById('admin-menus-list');
    if (!db) { el.innerHTML = demoMsg(); return; }
    el.innerHTML = '<div class="text-xs text-slate-400 text-center py-8">読み込み中...</div>';
    try {
      const orgsSnap = await db.collection('organizations').get();
      const allMenus = [];
      await Promise.all(orgsSnap.docs.map(async orgDoc => {
        const org = orgDoc.data();
        const menusSnap = await db.collection('organizations').doc(orgDoc.id).collection('menus').get();
        menusSnap.docs.forEach(m => {
          allMenus.push({ orgId: orgDoc.id, orgName: org.name || '—', menuId: m.id, ...m.data() });
        });
      }));
      allMenus.sort((a,b) => (b.created_at?.toMillis?.()??0) - (a.created_at?.toMillis?.()??0));
      const countEl = document.getElementById('menus-count');
      if (countEl) countEl.textContent = `全 ${allMenus.length} 件`;
      if (allMenus.length === 0) {
        el.innerHTML = '<div class="text-xs text-slate-400 text-center py-10">支援メニューはありません</div>';
        return;
      }
      el.innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b border-slate-100">
              <tr>
                <th class="text-left px-5 py-3 text-xs font-black text-slate-500">団体名</th>
                <th class="text-left px-5 py-3 text-xs font-black text-slate-500">支援メニュー名</th>
                <th class="text-left px-5 py-3 text-xs font-black text-slate-500 hidden sm:table-cell">登録日</th>
                <th class="text-left px-5 py-3 text-xs font-black text-slate-500 hidden sm:table-cell">状態</th>
                <th class="px-5 py-3"></th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              ${allMenus.map(m => `
                <tr class="hover:bg-slate-50 transition-colors">
                  <td class="px-5 py-3 text-xs font-bold text-slate-700">${esc(m.orgName)}</td>
                  <td class="px-5 py-3 text-xs text-[#0f0e2e] font-bold">${esc(m.title||'—')}</td>
                  <td class="px-5 py-3 text-xs text-slate-400 hidden sm:table-cell">${fmtDate(m.created_at)}</td>
                  <td class="px-5 py-3 hidden sm:table-cell">${statusBadge(m.status||'private')}</td>
                  <td class="px-5 py-3 text-right">
                    <div class="flex items-center gap-2 justify-end">
                      ${m.status !== 'private' ? `
                      <button data-org="${esc(m.orgId)}" data-menu="${esc(m.menuId)}" data-title="${esc(m.title||'メニュー')}"
                        onclick="forceHideMenu(this.dataset.org, this.dataset.menu, this.dataset.title)"
                        class="flex items-center gap-1 px-3 py-1.5 bg-amber-50 hover:bg-amber-100 text-amber-600 text-xs font-bold rounded-lg transition-all">
                        <i data-lucide="eye-off" width="12" height="12"></i>非公開
                      </button>` : ''}
                      <button data-org="${esc(m.orgId)}" data-menu="${esc(m.menuId)}" data-title="${esc(m.title||'メニュー')}"
                        onclick="deleteAdminMenu(this.dataset.org, this.dataset.menu, this.dataset.title)"
                        class="flex items-center gap-1 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-500 text-xs font-bold rounded-lg transition-all">
                        <i data-lucide="trash-2" width="12" height="12"></i>削除
                      </button>
                    </div>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      lucide.createIcons();
    } catch(e) { el.innerHTML = errMsg(e); }
  }

  function deleteAdminMenu(orgId, menuId, menuTitle) {
    showConfirm(
      `「${menuTitle}」を削除しますか？`,
      'この操作は取り消せません。クラブページからも非表示になります。',
      '削除する', 'bg-red-500 hover:bg-red-600',
      async () => {
        if (!db) { showToast('Firebase未設定です', false); return; }
        try {
          await db.collection('organizations').doc(orgId).collection('menus').doc(menuId).delete();
          showToast('支援メニューを削除しました');
          loadAdminMenus();
        } catch(e) { showToast('エラー: ' + e.message, false); }
      }
    );
  }

  function forceHideMenu(orgId, menuId, menuTitle) {
    showConfirm(
      `「${menuTitle}」を強制非公開にしますか？`,
      'メニューはオーナーのマイページで再公開できます。不適切なコンテンツの場合は削除を使用してください。',
      '非公開にする', 'bg-amber-500 hover:bg-amber-600',
      async () => {
        if (!db) { showToast('Firebase未設定です', false); return; }
        try {
          await db.collection('organizations').doc(orgId).collection('menus').doc(menuId).update({ status: 'private' });
          showToast('支援メニューを非公開にしました');
          loadAdminMenus();
        } catch(e) { showToast('エラー: ' + e.message, false); }
      }
    );
  }

  // ============================================================
  // ヘルパー
  // ============================================================
  function demoMsg() {
    return '<div class="text-xs text-amber-600 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3 text-center">Firebase未設定のため表示できません</div>';
  }
  function errMsg(e) {
    return `<div class="text-xs text-red-500 bg-red-50 border border-red-100 rounded-xl px-4 py-3 text-center">読み込みエラー: ${esc(e.message)}</div>`;
  }

  // ============================================================
  // 否認ダイアログ制御（TASK-03）
  // ============================================================
  let _rejectCallback = null;
  function showRejectDialog(orgId, orgName) {
    document.getElementById('reject-dialog-title').textContent = `「${orgName}」を却下しますか？`;
    document.getElementById('reject-reason').value = '';
    _rejectCallback = async () => {
      const reason = document.getElementById('reject-reason').value.trim();
      if (!db) { showToast('Firebase未設定です', false); return; }
      try {
        await db.collection('organizations').doc(orgId).update({
          status: 'rejected', updated_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('却下しました');
        loadTab(currentTab); loadOverview();
        // 申請者へ否認メール送信
        const orgSnap = await db.collection('organizations').doc(orgId).get();
        if (orgSnap.exists) {
          sendOrgStatusEmail('reject', orgSnap.data(), reason);
        }
      } catch(e) { showToast('エラー: ' + e.message, false); }
    };
    const d = document.getElementById('reject-dialog');
    d.classList.remove('hidden'); d.classList.add('flex');
    setTimeout(() => document.getElementById('reject-reason').focus(), 50);
  }
  function closeRejectDialog() {
    document.getElementById('reject-dialog').classList.add('hidden');
    document.getElementById('reject-dialog').classList.remove('flex');
    _rejectCallback = null;
  }
  document.getElementById('reject-ok').addEventListener('click', async () => {
    if (_rejectCallback) await _rejectCallback();
    closeRejectDialog();
  });
  document.getElementById('reject-dialog').addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeRejectDialog(); return; }
    // M-7: Tab キーのフォーカストラップ
    if (e.key === 'Tab') {
      const btns = document.getElementById('reject-dialog').querySelectorAll('button, textarea');
      const focusable = [...btns].filter(el => !el.disabled);
      if (!focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  });

  // ============================================================
  // 承認・否認メール送信（TASK-03 / Nodemailer + Netlify Function）
  // ============================================================
  async function sendOrgStatusEmail(type, orgData, rejectReason = '') {
    try {
      const now = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const params = type === 'approve'
        ? {
            toEmail:     orgData.contact_email,
            toName:      orgData.name,
            clubName:    orgData.name,
            approvedAt:  now,
            clubPageUrl: `${location.origin}/club.html?id=${orgData._id || ''}`,
          }
        : {
            toEmail:      orgData.contact_email,
            toName:       orgData.name,
            clubName:     orgData.name,
            rejectReason: rejectReason || '',
          };
      await fetch('/.netlify/functions/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, params }),
      });
    } catch(e) { console.warn('ステータスメール送信失敗:', e); }
  }

  // ============================================================
  // BFCache（戻るボタン）対策: キャッシュから復元された場合も認証チェック
  // ============================================================
  window.addEventListener('pageshow', e => {
    if (e.persisted && auth && !auth.currentUser) {
      showLogin();
    }
  });

  // ============================================================
  // P-2: 本番環境で console.log を無効化（warn/error は残す）
  // ============================================================
  if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    console.log = () => {};
  }

  // ============================================================
  // 初期化
  // ============================================================
  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
  });
  </script>
</body>
