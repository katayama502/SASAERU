[build]
  publish = "."

# admin.html は直接配信（SPAリダイレクト対象外）
[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

# それ以外はSPAルーティング
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
